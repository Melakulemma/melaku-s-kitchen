<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Melaku's Kitchen</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: #1e1e1e; padding: 40px; border-radius: 12px; width: 300px; text-align: center; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #ff4757; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Admin Login</h2>
        <form id="loginForm">
            <input type="text" id="user" placeholder="Username" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p id="msg"></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;

            try {
                const response = await fetch("mongodb+srv://melaku:melaku2121@cluster0.orfhtrm.mongodb.net/?appName=Cluster0", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('adminToken', data.token); // Save login status
                    msg.innerText = "Login Successful! Redirecting...";
                    setTimeout(() => window.location.href = "admin-dashboard.html", 1000);
                } else {
                    msg.innerText = data.error || "Invalid Credentials";
                }
            } catch (err) {
                msg.innerText = "Error connecting to server.";
            }
        });
    </script>
</body>
</html>
