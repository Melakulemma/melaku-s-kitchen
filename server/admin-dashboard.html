<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Melaku's Kitchen</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 20px; }
        .container { max-width: 800px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 12px; }
        .form-group { margin-bottom: 15px; }
        input, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: none; }
        input { background: #2a2a2a; color: white; border: 1px solid #444; }
        button { background: #2ecc71; color: white; font-weight: bold; cursor: pointer; }
        .logout { background: #ff4757; margin-top: 20px; }
        .product-list { margin-top: 30px; border-top: 1px solid #444; padding-top: 20px; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🍴 Admin Dashboard</h2>
        <p>Welcome back, Melaku!</p>
        
        <div class="add-product">
            <h3>Add New Recipe</h3>
            <form id="productForm">
                <input type="text" id="title" placeholder="Recipe Name (e.g. Doro Wat)" required>
                <input type="number" id="price" placeholder="Price (ETB)" required>
                <input type="text" id="category" placeholder="Category (Lunch/Dinner)">
                <input type="text" id="image" placeholder="Image URL (images/food.jpg)">
                <button type="submit">Add to Menu</button>
            </form>
        </div>

        <div class="product-list" id="productList">
            <h3>Current Menu</h3>
            </div>

        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <script>
       document.getElementById('productForm').onsubmit = async (e) => {
    e.preventDefault();
    
    const payload = {
        title: document.getElementById('title').value,
        price: Number(document.getElementById('price').value),
        category: document.getElementById('category').value,
        image: document.getElementById('image').value
    };

    try {
        const response = await fetch("https://melaku-s-kitchen.onrender.com/api/recipes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            alert("✅ Food added successfully!");
            location.reload(); 
        }
    } catch (err) {
        alert("❌ Error: Check if your server is running.");
    }
};
    </script>
</body>
</html>
