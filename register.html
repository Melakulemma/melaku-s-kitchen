<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin - Melaku's Kitchen</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 320px; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; }
        button { background: #ff4757; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ff6b81; }
        #status { margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Create Admin</h2>
        <form id="regForm">
            <input type="text" id="user" placeholder="Username" required>
            <input type="password" id="pass" placeholder="Password" required>
            <select id="role">
                <option value="admin">Admin</option>
                <option value="user">User</option>
            </select>
            <button type="submit">Register Account</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            status.innerText = "Sending...";

            const payload = {
                username: document.getElementById('user').value,
                password: document.getElementById('pass').value,
                role: document.getElementById('role').value
            };

            try {
                // IMPORTANT: Replace this URL with your ACTUAL Render URL
                const response = await fetch("https://melaku-e-shopping.onrender.com/api/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (response.ok) {
                    status.style.color = "#2ecc71";
                    status.innerText = "✅ Success: " + data.message;
                } else {
                    status.style.color = "#ff4757";
                    status.innerText = "❌ Error: " + data.error;
                }
            } catch (err) {
                status.style.color = "#ff4757";
                status.innerText = "❌ Failed to connect to server.";
            }
        });
    </script>
</body>
</html>
