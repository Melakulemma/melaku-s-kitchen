<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin - Melaku's Kitchen</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); width: 350px; text-align: center; border: 1px solid #333; }
        h2 { margin-bottom: 1.5rem; color: #ff4757; }
        input, select, button { width: 100%; padding: 12px; margin: 12px 0; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; font-size: 1rem; }
        button { background: #ff4757; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button:hover { background: #ff6b81; transform: translateY(-2px); }
        #status { margin-top: 20px; font-weight: 500; min-height: 24px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Create Admin</h2>
        <form id="regForm">
            <input type="text" id="user" placeholder="Username" required>
            <input type="password" id="pass" placeholder="Password" required>
            <select id="role">
                <option value="admin">Admin</option>
                <option value="user">User</option>
            </select>
            <button type="submit">Register Account</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        document.getElementById('regForm').onclick = async (e) => {
    e.preventDefault();
    const status = document.getElementById('status') || { innerText: "" };
    
    const payload = {
        username: document.getElementById('user').value,
        password: document.getElementById('pass').value,
        role: document.getElementById('role').value
    };

    try {
        // Double check this URL matches your Render Dashboard!
        const response = await fetch("https://melaku-s-kitchen.onrender.com/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await response.json();
        alert(data.message || data.error);
    } catch (err) {
        console.error(err);
        alert("Could not connect to server. Is Render awake?");
    }
};
    </script>
</body>
</html>
