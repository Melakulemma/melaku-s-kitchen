<script>
    const regForm = document.getElementById('regForm');
    
    regForm.onsubmit = async (e) => {
        e.preventDefault();
        const status = document.getElementById('status');
        status.innerText = "Processing...";

        const payload = {
            username: document.getElementById('user').value,
            password: document.getElementById('pass').value,
            role: document.getElementById('role').value
        };

        try {
            // Update this URL to your NEW Render link
            const response = await fetch("https://melaku-s-kitchen.onrender.com/api/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            if (response.ok) {
                alert("✅ Success: " + data.message);
                window.location.href = "login.html"; // Move to login after success
            } else {
                alert("❌ Error: " + data.error);
            }
        } catch (err) {
            alert("❌ Connection failed. Check your internet or Render dashboard.");
        }
    };
</script>
